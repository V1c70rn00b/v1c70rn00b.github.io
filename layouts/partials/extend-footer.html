<!DOCTYPE html>
<!-- System Status Footer -->
<div id="status-footer">
    <canvas id="footer-particles"></canvas>
    <div class="status-left">
        <span class="status-item">[STATUS: <span style="color: #426642;">ONLINE</span>]</span>
        <span class="status-item">[UPTIME: <span id="uptime-counter">calculating...</span>]</span>
        <span class="status-item mobile-hide">[MODE: <span id="mode-text" style="color: #B35726;">STEALTH</span>]</span>
        <span class="status-item mobile-hide">[TIME: <span id="current-time" style="color: #B35726;">00:00:00</span>]</span>
    </div>
</div>

<script>
(function () {
    const c = document.getElementById('footer-particles');
    const ctx = c.getContext('2d');
    let w, h;
    const particles = [];

    function resize() {
        w = c.width = c.parentElement.offsetWidth;
        h = c.height = c.parentElement.offsetHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Packet {
        constructor() { this.reset(); }
        reset() {
            this.x = Math.random() * w;
            this.y = Math.random() * h;
            this.speed = Math.random() * 2 + 1;
            this.size = Math.random() * 2 + 1;
            this.len = Math.random() * 20 + 5;
            this.alpha = Math.random() * 0.5 + 0.1;
            this.isBinary = Math.random() > 0.8;
        }
        update() {
            this.x += this.speed;
            if (this.x > w + this.len) this.x = -this.len;
        }
        draw() {
            ctx.fillStyle = `rgba(0, 255, 65, ${this.alpha})`;
            if (this.isBinary) {
                ctx.font = '10px monospace';
                ctx.fillText(Math.random() > 0.5 ? '1' : '0', this.x, this.y);
            } else {
                ctx.fillRect(this.x, this.y, this.len, this.size);
            }
        }
    }

    for (let i = 0; i < 40; i++) particles.push(new Packet());

    function loop() {
        ctx.fillStyle = 'rgba(13, 17, 23, 0.2)';
        ctx.fillRect(0, 0, w, h);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(loop);
    }
    loop();

    function updateUptime() {
        // ⚠️ CHANGE THIS TO YOUR BLOG'S LAUNCH DATE!
        const launchDate = new Date('2024-02-24T00:00:00');
        const now = new Date();
        const diff = now - launchDate;

        const totalSeconds = Math.floor(diff / 1000);
        const totalDays = Math.floor(totalSeconds / (60 * 60 * 24));
        const hours = Math.floor((totalSeconds % (60 * 60 * 24)) / (60 * 60));
        const minutes = Math.floor((totalSeconds % (60 * 60)) / 60);
        const seconds = totalSeconds % 60;

        const years = Math.floor(totalDays / 365);
        const remainingDaysAfterYears = totalDays % 365;
        const months = Math.floor(remainingDaysAfterYears / 30);
        const days = remainingDaysAfterYears % 30;

        let uptimeText;
        if (years > 0) {
            uptimeText = `${years}y ${months}mo ${days}d ${hours}h ${minutes}m ${seconds}s`;
        } else if (months > 0) {
            uptimeText = `${months}mo ${days}d ${hours}h ${minutes}m ${seconds}s`;
        } else {
            uptimeText = `${days}d ${hours}h ${minutes}m ${seconds}s`;
        }

        const uptimeElem = document.getElementById('uptime-counter');
        if (uptimeElem) {
            uptimeElem.textContent = uptimeText;
        }
    }

    setInterval(updateUptime, 1000);
    updateUptime();

    function updateClock() {
        const now = new Date();
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');
        const timeString = `${hours}:${minutes}:${seconds}`;
        const clockElem = document.getElementById('current-time');
        if (clockElem) {
            clockElem.textContent = timeString;
        }
    }
    setInterval(updateClock, 1000);
    updateClock();

})();
</script>

<style>
#status-footer {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 30px;
    background: #9a6363;
    border-top: 1px solid #090909;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    padding: 0 1rem;
    z-index: 9999;
    font-family: 'Courier New', Courier, monospace;
    font-size: 0.8rem;
    color: #03030c;
    overflow: hidden;
}

#footer-particles {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 30px;
    z-index: 0;
    pointer-events: none;
    opacity: 0.6;
}

.status-left {
    display: flex;
    gap: 1.5rem;
    white-space: nowrap;
    position: relative;
    z-index: 2;
    padding: 5px 1rem;
    align-items: center;
}

.status-item {
    font-weight: bold;
}

@media (max-width: 768px) {
    .mobile-hide {
        display: none;
    }
    
    .status-left {
        gap: 1rem;
        font-size: 0.7rem;
    }
}

body {
    padding-bottom: 35px;
}
</style>
</html>
